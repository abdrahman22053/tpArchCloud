version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto8
  build:
    commands:
      - mvn clean package
      - mkdir output
      - cp target/lab2-webapp.war output/

artifacts:
  files:
    - output/lab2-webapp.war
    - appspec.yml
    - install_dependencies.sh
    - start_server.sh
    - stop_server.sh
